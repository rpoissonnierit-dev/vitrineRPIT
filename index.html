    <!-- ══════════════════════════════════════════════════════════════
         PERFORMANCE — critical resource hints
         Preconnect: tells the browser to open TCP/TLS to these
                     origins before they're needed.
         Preload:    fetches critical assets at highest priority.
    ══════════════════════════════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- dns-prefetch is a lighter fallback for browsers that don't support preconnect -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!--
      NON-BLOCKING FONT LOADING — eliminates the 750ms render-blocking penalty.

      How it works (the "loadCSS" pattern):
        1. rel="preload" as="style"  → browser downloads the font CSS in the background,
                                       at high priority, WITHOUT blocking rendering.
        2. onload callback           → once downloaded, flips rel to "stylesheet",
                                       which injects the fonts into the page.
        3. this.onload = null        → prevents the callback firing a second time.
        4. <noscript> fallback       → if JavaScript is disabled, loads normally.

      The page renders instantly with fallback system fonts (defined below in the
      inline <style> block). Fonts visually "swap in" within milliseconds —
      invisible to most users thanks to display=swap.
    -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Limelight&family=Plaster&family=Inter:wght@400;500;600&display=swap&subset=latin"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Limelight&family=Plaster&family=Inter:wght@400;500;600&display=swap&subset=latin"
      />
    </noscript>

    <!-- Hero photo — preloaded so it renders immediately when the loading
         overlay exits (improves LCP score significantly) -->
    <!-- LCP image: the loading-overlay logo is the first large painted element -->
    <link rel="preload" as="image" href="/mainwhalewhite.svg" fetchpriority="high" type="image/svg+xml" />
    <!-- Hero photo preloaded so it's ready when the loading overlay exits -->

    <meta name="format-detection" content="telephone=no" />

    <!-- ══════════════════════════════════════════════════════════════
         CRITICAL INLINE CSS
         Prevents flash-of-white and layout shift before React hydrates.
         Also declares fallback font stacks used while Google Fonts loads.
    ══════════════════════════════════════════════════════════════════ -->
    <style>
      /*
        Fallback font stacks — rendered instantly, before Google Fonts arrives.
        "Limelight" and "Plaster" fall back to Georgia/serif (closest visual match).
        "Inter" falls back to the system UI font stack (already looks great).
        Once the real fonts download, display:swap replaces these automatically.
      */
      .font-limelight, .font-plaster {
        font-family: 'Limelight', 'Plaster', Georgia, 'Times New Roman', serif;
      }
      .font-inter {
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont,
                     'Segoe UI', Roboto, sans-serif;
      }

      html, body, #root {
        margin: 0;
        padding: 0;
        background-color: #000509;
        overflow-x: hidden;
        scroll-behavior: smooth;
      }

      /* Pre-React loading shell */
      #loading-shell {
        position: fixed;
        inset: 0;
        z-index: 200;
        background: radial-gradient(
          ellipse at 49.8% 50.6%,
          #01468b 0%, #01366a 25%, #00254a 50%,
          #00152a 75%, #000d19 87.5%, #000509 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.4s ease;
      }
      #loading-shell.fade-out { opacity: 0; pointer-events: none; }

      body.is-loading { overflow: hidden; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #000509; }
      ::-webkit-scrollbar-thumb { background: rgba(248,207,0,.4); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #f8cf00; }

      * { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    </style>
  </head>

      onfocus="this.style.cssText='position:fixed;top:8px;left:8px;padding:12px 20px;background:#ffe355;color:#162456;font-family:sans-serif;font-weight:bold;border-radius:6px;z-index:9999;width:auto;height:auto;overflow:visible'"

    <!-- Pre-React loading shell — uses the preloaded SVG file directly.

    <div id="loading-shell" aria-hidden="true">

           style="opacity:0.92" decoding="sync" />
    </div>
